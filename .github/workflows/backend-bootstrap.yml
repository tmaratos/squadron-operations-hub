name: Bootstrap Production Backend

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-production-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    defaults:
      run:
        working-directory: cloudflare/worker

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate production Wrangler configuration
        run: npm run prepare:config
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}

      - name: Apply all database migrations
        run: npx wrangler d1 migrations apply DB --remote --config wrangler.generated.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate initial owner activation SQL
        run: npm run bootstrap:owners
        env:
          OWNER_TRISTAN_EMAIL: ${{ secrets.OWNER_TRISTAN_EMAIL }}
          OWNER_MELLARD_EMAIL: ${{ secrets.OWNER_MELLARD_EMAIL }}

      - name: Activate initial System Owners
        run: npx wrangler d1 execute DB --remote --config wrangler.generated.jsonc --file seed/bootstrap-owners.generated.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/worker
          command: deploy --config wrangler.generated.jsonc
          secrets: |
            MAILGUN_API_KEY
            MAILGUN_DOMAIN
        env:
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
